<!-- default doctype and meta info dw about this stuff -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Playground</title>

    <!-- links to your css files -->
    <link rel="stylesheet" href="./default/reset.css" />
    <link rel="stylesheet" href="./default/default.css" />
    <link rel="stylesheet" href="./styles.css" />

    <!-- Auto-versioning script -->
    <script>
      // Add timestamp to all CSS and JS files for cache busting
      (function () {
        const timestamp = new Date().getTime();
        document.querySelectorAll('link[rel="stylesheet"]').forEach((link) => {
          link.href += "?v=" + timestamp;
        });
      })();
    </script>
  </head>

  <!-- code playground starts here -->
  <body>
    <header>
      <div class="title">
        <a href="./">Code Playground</a>
      </div>

      <div class="message">
        <p>Don't be afraid to break the code.</p>
      </div>

      <nav class="home-examples">
        <ul>
          <li><a href="./examples">Examples</a></li>
        </ul>
      </nav>
    </header>

    <!-- main playground -->
    <main>
      <!-- duplicate the box by copy and pasting the 'section' element with the 'box' class below -->
      <section>
        <div class="box">
          <p>Try editing this text</p>
        </div>
      </section>
    </main>
  </body>

  <!-- link to script file -->
  <script>
    // Auto-version the main script file
    (function () {
      const timestamp = new Date().getTime();
      const script = document.createElement("script");
      script.src = "./script.js?v=" + timestamp;
      document.head.appendChild(script);
    })();
  </script>
</html>
